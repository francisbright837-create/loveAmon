<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - LoveConnect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #fce4ec; padding: 20px; }
    h1 { color: #e91e63; margin-bottom: 20px; text-align: center; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; max-width: 900px; margin-left: auto; margin-right: auto; }
    .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .stat-card h3 { color: #e91e63; font-size: 2em; margin-bottom: 5px; }
    .stat-card p { color: #666; }
    table { width: 100%; max-width: 900px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #e91e63; color: white; }
    tr:hover { background: #f5f5f5; }
    .delete-btn { background: #ff1744; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }
    .delete-btn:hover { background: #d50000; }
    .loading { text-align: center; padding: 40px; color: #e91e63; }
    .error { text-align: center; padding: 40px; color: red; }
  </style>
</head>
<body>
  <h1>💕 LoveConnect Admin</h1>
  
  <div class="stats" id="stats">
    <div class="stat-card"><h3 id="stat-users">0</h3><p>Total Users</p></div>
    <div class="stat-card"><h3 id="stat-likes">0</h3><p>Total Likes</p></div>
    <div class="stat-card"><h3 id="stat-matches">0</h3><p>Total Matches</p></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Gender</th>
        <th>Interest</th>
        <th>Joined</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="usersTable">
      <tr><td colspan="6" class="loading">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    // Use hardcoded production URL for now
    const API_URL = 'https://loveamon.onrender.com/api/admin';

    function loadStats() {
      fetch(API_URL + '/stats')
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(data => {
          document.getElementById('stat-users').textContent = data.totalUsers || 0;
          document.getElementById('stat-likes').textContent = data.totalLikes || 0;
          document.getElementById('stat-matches').textContent = data.totalMatches || 0;
        })
        .catch(err => {
          console.error('Stats error:', err);
          document.getElementById('stat-users').textContent = '!';
          document.getElementById('stat-likes').textContent = '!';
          document.getElementById('stat-matches').textContent = '!';
        });
    }

    function loadUsers() {
      const tbody = document.getElementById('usersTable');
      fetch(API_URL + '/users')
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(data => {
          if (!data.users || data.users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">No users found</td></tr>';
            return;
          }
          tbody.innerHTML = data.users.map(user => `
            <tr>
              <td>${user.name || '-'}</td>
              <td>${user.email || '-'}</td>
              <td>${user.gender || '-'}</td>
              <td>${user.interest || '-'}</td>
              <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : '-'}</td>
              <td><button class="delete-btn" onclick="deleteUser('${user._id}')">Delete</button></td>
            </tr>
          `).join('');
        })
        .catch(err => {
          console.error('Users error:', err);
          tbody.innerHTML = '<tr><td colspan="6" class="error">Error: ' + err.message + '</td></tr>';
        });
    }

    function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      fetch(API_URL + '/users/' + id, { method: 'DELETE' })
        .then(() => { loadUsers(); loadStats(); })
        .catch(err => alert('Delete failed: ' + err.message));
    }

    // Load immediately
    loadStats();
    loadUsers();
  </script>
</body>
</html>
